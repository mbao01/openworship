<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-labelledby="c1b-title">
  <title id="c1b-title">openworship icon</title>
  <defs>
    <style>.c1b { fill: #C9A84C; }</style>
  </defs>
  <!-- Soft aperture: rounded petal/blade shapes arranged in a circle with a void at center -->
  <g transform="translate(40, 40)">
    <!-- Blade 1 (top) -->
    <path d="M-4,-10 Q0,-28 4,-10 Q2,-8 0,-8 Q-2,-8 -4,-10 Z" class="c1b" opacity="0.95" transform="rotate(0)"/>
    <!-- Blade 2 -->
    <path d="M-4,-10 Q0,-28 4,-10 Q2,-8 0,-8 Q-2,-8 -4,-10 Z" class="c1b" opacity="0.88" transform="rotate(60)"/>
    <!-- Blade 3 -->
    <path d="M-4,-10 Q0,-28 4,-10 Q2,-8 0,-8 Q-2,-8 -4,-10 Z" class="c1b" opacity="0.80" transform="rotate(120)"/>
    <!-- Blade 4 -->
    <path d="M-4,-10 Q0,-28 4,-10 Q2,-8 0,-8 Q-2,-8 -4,-10 Z" class="c1b" opacity="0.95" transform="rotate(180)"/>
    <!-- Blade 5 -->
    <path d="M-4,-10 Q0,-28 4,-10 Q2,-8 0,-8 Q-2,-8 -4,-10 Z" class="c1b" opacity="0.88" transform="rotate(240)"/>
    <!-- Blade 6 -->
    <path d="M-4,-10 Q0,-28 4,-10 Q2,-8 0,-8 Q-2,-8 -4,-10 Z" class="c1b" opacity="0.80" transform="rotate(300)"/>
  </g>
</svg>
