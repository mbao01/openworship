name: CD – Release

on:
  push:
    tags:
      # Single scheme: YYYY.M.COUNTER
      # Unstable:    0000.0.1, 0000.0.2, ...
      # Production:  2026.4.0, 2026.4.1, ...
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Pre-build the scripture embedding index ──────────────────────────────────
  # Runs once on Linux before the platform matrix. The index is keyed on the
  # SHA-256 of the Bible source files so it is only regenerated when content
  # actually changes. The fastembed ONNX model is cached separately.
  generate-embedding-index:
    runs-on: ubuntu-22.04
    name: Build scripture embedding index
    # ort-sys links statically against ORT 1.20.0 by default which can
    # take 60-120 min. We pre-install the ORT shared library and use
    # ORT_PREFER_DYNAMIC_LINK=1 so linking takes seconds instead.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-targets: "true"

      # ort-sys 2.0.0-rc.9 expects ORT 1.20.0. Cache the official shared-library
      # release from GitHub so we can link dynamically (fast) instead of static-
      # linking against the huge pre-built static archive (slow).
      - name: Cache ONNX Runtime 1.20.0 shared library
        id: ort-bin-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/lib/onnxruntime
          key: onnxruntime-1.20.0-linux-x64

      - name: Download ONNX Runtime 1.20.0
        if: steps.ort-bin-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/lib/onnxruntime
          curl -fsSL https://github.com/microsoft/onnxruntime/releases/download/v1.20.0/onnxruntime-linux-x64-1.20.0.tgz \
            -o /tmp/ort.tgz
          tar -xzf /tmp/ort.tgz -C ~/.local/lib/onnxruntime --strip-components=1
          rm /tmp/ort.tgz

      - name: Cache fastembed ONNX model
        uses: actions/cache@v4
        with:
          path: ~/.openworship/.cache/fastembed
          key: fastembed-nomic-embed-text-v1.5

      - name: Cache pre-built embedding index
        id: index-cache
        uses: actions/cache@v4
        with:
          path: apps/desktop/resources
          key: scripture-index-${{ hashFiles('crates/ow-db/data/*.txt') }}

      - name: Build embedding index (all translations)
        if: steps.index-cache.outputs.cache-hit != 'true'
        run: |
          # Point ort-sys at the pre-installed ORT 1.20.0 shared library so it
          # skips the default static-archive download/link (which takes 60-120 min).
          # ORT_PREFER_DYNAMIC_LINK=1 emits -lonnxruntime instead of a static link.
          export ORT_LIB_LOCATION="$HOME/.local/lib/onnxruntime"
          export ORT_PREFER_DYNAMIC_LINK=1
          export LD_LIBRARY_PATH="$HOME/.local/lib/onnxruntime/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          cargo run -p ow-embed-builder --release -- --translation KJV
          cargo run -p ow-embed-builder --release -- --translation WEB
          cargo run -p ow-embed-builder --release -- --translation BSB

      - name: Upload embedding index artifact
        uses: actions/upload-artifact@v4
        with:
          name: scripture-index
          path: apps/desktop/resources/
          if-no-files-found: error

  # ── Platform release builds ───────────────────────────────────────────────────
  release:
    needs: generate-embedding-index
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Download pre-built embedding index
        uses: actions/download-artifact@v4
        with:
          name: scripture-index
          path: apps/desktop/resources/

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # whisper.cpp/ggml requires macOS 10.15+ for std::filesystem;
          # Apple Silicon requires 11.0+. Force it here to complement .cargo/config.toml.
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.platform == 'macos-latest' && '11.0' || '' }}
          # macOS code signing (optional — set in repo secrets to enable)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing (optional — set in repo secrets to enable)
          # Steps to provision:
          #   1. Purchase an EV or OV code signing certificate (~$300-700/yr; EV preferred
          #      for instant SmartScreen trust without reputation build-up).
          #   2. Export the cert as a .pfx file, then base64-encode it:
          #        openssl base64 -A -in certificate.pfx -out certificate.b64
          #   3. Add the following secrets to the GitHub repo:
          #        WINDOWS_CERTIFICATE          — the base64-encoded .pfx contents
          #        WINDOWS_CERTIFICATE_PASSWORD — the .pfx passphrase
          #   4. On the next tagged release, Tauri will automatically sign the
          #      generated .msi / .exe installers using these credentials.
          TAURI_SIGNING_WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          TAURI_SIGNING_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          # Tauri updater signing — generate key pair with `tauri signer generate`
          # then store private key + password in repo secrets:
          #   TAURI_PRIVATE_KEY  — base64-encoded .key file contents
          #   TAURI_KEY_PASSWORD — passphrase used when generating the key
          # The matching public key must be set in tauri.conf.json plugins.updater.pubkey.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # Sentry crash reporting — VITE_SENTRY_DSN must be added as a GitHub
          # Actions repository secret. VITE_APP_VERSION is derived from the tag
          # so it requires no secret. Both are embedded at Vite build time.
          # If VITE_SENTRY_DSN is not set the app builds fine but crash reports
          # are silently disabled (see apps/web/src/lib/sentry.ts).
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_VERSION: ${{ github.ref_name }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "OpenWorship ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG for details."
          releaseDraft: true
          prerelease: false
          # Inject the pre-built embedding index resources into the bundle.
          # The --config flag merges with tauri.conf.json; resources are only
          # bundled in release builds where the index files have been downloaded.
          args: >-
            ${{ matrix.args }}
            --config '{"bundle":{"resources":["resources/scripture_index_*.bin","resources/scripture_index_*.sha256"]}}'
